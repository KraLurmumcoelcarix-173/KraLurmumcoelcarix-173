<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 220" width="880" height="220" role="img" aria-label="Hello World - Hello PKONG">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1b27"/>
      <stop offset="1" stop-color="#13141d"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#70a5fd"/>
      <stop offset="0.5" stop-color="#bf91f3"/>
      <stop offset="1" stop-color="#38bdae"/>
    </linearGradient>
    <linearGradient id="scan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#00aeff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#00aeff" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#00aeff" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#70a5fd" stroke-opacity="0.07" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="round"><rect width="880" height="220" rx="18"/></clipPath>
  </defs>

  <g clip-path="url(#round)">
    <rect width="880" height="220" fill="url(#bg)"/>
    <rect width="880" height="220" fill="url(#grid)"/>

    <!-- scanline sweep -->
    <rect x="0" width="880" height="56" fill="url(#scan)">
      <animate attributeName="y" values="-56;220" dur="4.5s" repeatCount="indefinite"/>
    </rect>

    <!-- terminal path, top-left -->
    <text x="28" y="40" font-family="'SF Mono','Cascadia Code','JetBrains Mono',Consolas,monospace"
          font-size="13" fill="#5c75c3">~/KraLurmumcoelcarix-173 — main</text>
    <!-- status dot, top-right -->
    <circle cx="828" cy="35" r="5" fill="#38bdae">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="818" y="40" text-anchor="end" font-family="'SF Mono',Consolas,monospace"
          font-size="13" fill="#38bdae">online</text>

    <!-- corner brackets -->
    <g stroke="#38bdae" stroke-width="2" fill="none" opacity="0.5">
      <path d="M18 64 V52 H30"/>
      <path d="M862 64 V52 H850"/>
      <path d="M18 168 V180 H30"/>
      <path d="M862 168 V180 H850"/>
    </g>

    <!-- title -->
    <g filter="url(#glow)" font-family="'SF Mono','Cascadia Code','JetBrains Mono',Consolas,monospace">
      <text x="440" y="128" text-anchor="middle" font-size="60" font-weight="800"
            letter-spacing="3" fill="url(#title)">Hello World</text>
    </g>

    <!-- subtitle + blinking cursor (block centered as a unit) -->
    <text x="318" y="172" text-anchor="start"
          font-family="'SF Mono','Cascadia Code','JetBrains Mono',Consolas,monospace"
          font-size="23" letter-spacing="1.5" fill="#38bdae">&#8249; Hello, PKONG &#8250;</text>
    <rect x="552" y="155" width="11" height="21" rx="1" fill="#bf91f3">
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.49;0.5;1" dur="1.1s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
